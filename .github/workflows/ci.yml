name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: loans
          POSTGRES_PASSWORD: loans
          POSTGRES_DB: loans_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 3000
      API_PREFIX: api
      SWAGGER_ENABLED: false

      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: loans
      DB_PASSWORD: loans
      DB_NAME: loans_test
      DB_SYNCHRONIZE: false
      DB_LOGGING: false

      JWT_ACCESS_SECRET: ci-access-secret-must-be-at-least-32-chars
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ci-refresh-secret-must-be-at-least-32-chars
      JWT_REFRESH_EXPIRES_IN: 7d

      BCRYPT_SALT_ROUNDS: 4

      MAX_ACTIVE_LOANS: 3
      DAILY_FINE_RATE: 0.50
      MAX_LOAN_DAYS: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run migrations
        run: npm run migration:run

      - name: Run unit tests
        run: npm test -- --passWithNoTests

      - name: Run e2e tests
        run: npm run test:e2e
